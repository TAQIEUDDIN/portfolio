name: Portfolio CI

on:
    pull_request:
        branches: [main, staging]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                  node-version: '20'

            - name: Install dependencies
              run: npm install
            
            - name: Run lint
              run: npm run lint

            - name: Build project
              run: npm run build